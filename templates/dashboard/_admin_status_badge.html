{% if tone == 'success' %}
  <span class="status-pill px-3 py-1 text-[11px]" data-tone="success">{{ label }}</span>
{% elif tone == 'warning' %}
  <span class="status-pill px-3 py-1 text-[11px]" data-tone="warning">{{ label }}</span>
{% elif tone == 'danger' %}
  <span class="status-pill px-3 py-1 text-[11px]" data-tone="danger">{{ label }}</span>
{% elif tone == 'info' %}
  <span class="status-pill px-3 py-1 text-[11px]" data-tone="info">{{ label }}</span>
{% else %}
  <span class="status-pill px-3 py-1 text-[11px]">{{ label }}</span>
{% endif %}
