{% extends 'dashboard/base_dashboard.html' %}

{% block dashboard_content %}
  <div class="glass-card p-6">
    <h1 class="text-2xl font-black">{% if instance %}ویرایش متن{% else %}ایجاد متن{% endif %}</h1>
    <form method="post" class="mt-6 grid gap-4">
      {% csrf_token %}
      {% for field in form %}
        <div>
          <label class="mb-2 block text-sm font-bold">{{ field.label }}</label>
          {{ field }}
          {{ field.errors }}
          {% if field.help_text %}<p class="helptext">{{ field.help_text }}</p>{% endif %}
        </div>
      {% endfor %}
      <button class="btn-primary w-full sm:w-auto" type="submit">ذخیره متن</button>
    </form>
  </div>
{% endblock %}
