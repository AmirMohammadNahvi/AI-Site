{% extends 'dashboard/base_dashboard.html' %}

{% block dashboard_content %}
  <div class="glass-card p-6">
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <h1 class="text-2xl font-black">مدیریت پلن‌ها</h1>
      <a href="{% url 'dashboard:admin_plan_create' %}" class="btn-primary">پلن جدید</a>
    </div>
    <div class="mt-6 grid gap-3">
      {% for plan in plans %}
        <div class="mobile-table-card">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <div>
              <div class="font-black">{{ plan.name }}</div>
              <div class="mt-1 text-sm text-slate-500">{{ plan.price|floatformat:0 }} تومان</div>
            </div>
            <a href="{% url 'dashboard:admin_plan_edit' plan.id %}" class="btn-secondary !px-4 !py-2">ویرایش</a>
          </div>
        </div>
      {% empty %}
        <p class="text-sm text-slate-500">پلنی وجود ندارد.</p>
      {% endfor %}
    </div>
  </div>
{% endblock %}
