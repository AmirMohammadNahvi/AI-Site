{% if messages %}
  <div class="section-shell mt-4 message-stack space-y-3">
    {% for message in messages %}
      <div class="message-banner" data-tone="{% if message.tags == 'success' %}success{% elif message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% else %}neutral{% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}
