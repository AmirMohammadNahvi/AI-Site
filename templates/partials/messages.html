{% if messages %}
  <div class="section-shell mt-4 space-y-3">
    {% for message in messages %}
      <div class="rounded-2xl border px-4 py-3 text-sm {% if message.tags == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-700 dark:border-emerald-900 dark:bg-emerald-950/40 dark:text-emerald-300{% elif message.tags == 'error' %}border-rose-200 bg-rose-50 text-rose-700 dark:border-rose-900 dark:bg-rose-950/40 dark:text-rose-300{% else %}border-slate-200 bg-white text-slate-700 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300{% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}
