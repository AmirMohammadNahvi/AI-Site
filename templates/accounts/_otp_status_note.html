<article class="auth-note{% if otp_note_tone %} is-{{ otp_note_tone }}{% endif %}">
  <span class="auth-note-marker" aria-hidden="true"></span>
  <div class="min-w-0">
    {% if otp_note_title %}
      <h3 class="auth-note-title">{{ otp_note_title }}</h3>
    {% endif %}
    {% if otp_note_body %}
      <p class="auth-note-body{% if otp_note_title %} mt-1{% endif %}">{{ otp_note_body }}</p>
    {% endif %}
  </div>
</article>
