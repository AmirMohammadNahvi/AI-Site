{% extends 'base.html' %}

{% block title %}ورود | {{ site_settings.site_name_fa }}{% endblock %}

{% block content %}
  <section class="section-shell pt-10">
    <div class="mx-auto max-w-xl glass-card p-6 sm:p-8">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <h1 class="text-3xl font-black">ورود به حساب</h1>
        <a href="{% url 'accounts:otp_request' %}" class="text-sm font-bold text-brand-primary">ورود با موبایل</a>
      </div>
      <form method="post" class="mt-6 grid gap-4">
        {% csrf_token %}
        {% for field in form %}
          <div>
            <label class="mb-2 block text-sm font-bold">{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
          </div>
        {% endfor %}
        <button class="btn-primary w-full" type="submit">ورود</button>
      </form>
    </div>
  </section>
{% endblock %}
