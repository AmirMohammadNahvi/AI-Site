{% extends 'dashboard/base_dashboard.html' %}

{% block title %}پروفایل | {{ site_settings.site_name_fa }}{% endblock %}

{% block dashboard_content %}
  <div class="glass-card p-6">
    <h1 class="text-2xl font-black">پروفایل من</h1>
    <form method="post" class="mt-6 grid gap-4">
      {% csrf_token %}
      {% for field in form %}
        <div>
          <label class="mb-2 block text-sm font-bold">{{ field.label }}</label>
          {{ field }}
          {{ field.errors }}
        </div>
      {% endfor %}
      <button class="btn-primary w-full sm:w-auto" type="submit">ذخیره تغییرات</button>
    </form>
  </div>
{% endblock %}
