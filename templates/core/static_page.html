{% extends 'base.html' %}

{% block title %}{{ page.title }} | {{ site_settings.site_name_fa }}{% endblock %}
{% block meta_description %}{{ page.seo_description|default:page.title }}{% endblock %}

{% block content %}
  <section class="section-shell pt-10">
    <article class="glass-card mx-auto max-w-4xl p-6 sm:p-8">
      <h1 class="text-3xl font-black">{{ page.title }}</h1>
      <div class="prose prose-slate mt-6 max-w-none leading-8 dark:prose-invert">{{ page.body|linebreaks }}</div>
    </article>
  </section>
{% endblock %}
