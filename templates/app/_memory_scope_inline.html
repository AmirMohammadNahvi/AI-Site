{% if memory_scope_inline %}
  <div class="chat-inline-meta">
    <span class="chat-inline-meta-label">حافظه</span>
    <span class="chat-inline-meta-value">
      {{ memory_scope_inline.label|default:"بدون دامنه فعال" }}
    </span>
    {% if memory_scope_inline.center_url %}
      <a href="{{ memory_scope_inline.center_url }}" class="chat-inline-meta-link">
        {{ memory_scope_inline.center_label|default:"مرکز حافظه" }}
      </a>
    {% endif %}
  </div>
{% endif %}
