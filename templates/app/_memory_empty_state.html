<section class="empty-state px-4 py-6 {% if not empty_compact %}sm:px-6 sm:py-8{% endif %}">
  <div class="empty-state-icon workspace-shell-card flex h-16 w-16 items-center justify-center rounded-[1.5rem] bg-white dark:bg-slate-950/70">
    <div class="relative flex h-8 w-8 items-center justify-center">
      <div class="absolute inset-0 rounded-full bg-slate-200 dark:bg-slate-700"></div>
      <div class="relative h-3.5 w-3.5 rounded-full bg-slate-500"></div>
    </div>
  </div>

  {% if empty_badge %}
    <div class="empty-state-badge meta-chip inline-flex px-3 py-1 text-[11px]">
      {{ empty_badge }}
    </div>
  {% endif %}

  <h3 class="mt-4 text-base font-black text-slate-900 dark:text-white">
    {{ empty_title|default:"چیزی برای نمایش وجود ندارد" }}
  </h3>

  <p class="mt-2 text-sm leading-7 text-slate-600 dark:text-slate-300">
    {{ empty_body|default:"وقتی حافظه‌ای ذخیره شده باشد، از همین‌جا به‌صورت روشن و قابل مدیریت نمایش داده می‌شود." }}
  </p>

  {% if empty_hint %}
    <p class="mt-2 text-xs leading-6 text-slate-500 dark:text-slate-400">{{ empty_hint }}</p>
  {% endif %}
</section>
