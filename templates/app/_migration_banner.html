{% if conversation_is_migrated %}
  <section
    x-data="{
      visible: true,
      storageKey: 'faralyar-migration-banner-{{ conversation.id|default:conversation_storage_key|default:'default' }}'
    }"
    x-init="visible = localStorage.getItem(storageKey) !== 'hidden'"
    x-cloak
    x-show="visible"
    x-transition.opacity
    class="app-shell-inline-note text-sm text-slate-600 dark:text-slate-300"
  >
    <div class="flex items-start justify-between gap-3">
      <div class="min-w-0">
        <div class="text-xs font-bold text-slate-500 dark:text-slate-400">تداوم گفتگو</div>
        <p class="mt-1 leading-7">
          این گفتگو از نسخه قبلی به فضای جدید منتقل شده و برای حفظ تداوم، همین‌جا در دسترس شماست.
        </p>
      </div>

      <button
        type="button"
        class="icon-btn !h-10 !w-10 shrink-0"
        @click="visible = false; localStorage.setItem(storageKey, 'hidden')"
        aria-label="بستن پیام انتقال گفتگو"
      >
        <svg class="h-4 w-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M6 6l8 8M14 6l-8 8" stroke-linecap="round"></path>
        </svg>
      </button>
    </div>
  </section>
{% endif %}
